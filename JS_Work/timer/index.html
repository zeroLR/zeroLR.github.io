<!doctype html>
<html>

<head>
	<meta charset='utf-8'>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>定時灑水</title>
	<link rel="stylesheet" type="text/css" href="./dist/css/webstyle.css">
</head>

<body>
	</br>
	<div class="div_Main">
		<table id="TIME">
			<caption>
				<h1>台東區農業改良場灑水控制 V1.2</h1>
			</caption>
			<tr>
				<th>日期</th>
				<td id="date" onclick="upTm()">2020-06-24 W1</td>
				<th>時間</th>
				<td onclick="upTm()">08:58:58</td>
				<!-- <td><button type="button" class="btn btn-warning mb-3" onclick="ckchm()">模式</button></td> -->
				<td style="background-color: burlywood;" onclick="ckchm()">模式</td>
			</tr>
			<tr>
				<th>連接網路</th>
				<td>獨立作業</td>
				<th>訊號品質</th>
				<td colspan=2>SAP模式<3200>
				</td>
			</tr>
			<tr>
				<td colspan=5>
					<input type="text" id='CMD'><input type='button' value='執行' onclick='printSelect()'>
				</td>
			</tr>
			<tr>
				<td colspan=5></td>
			</tr>
		</table>
		<div class="div_Station">
			<table id="STATION">
				<caption>
					<h1>站別</h1>
				</caption>
				<tr>
					<td><input id='SW1' class="button" type="button" value="停止" onclick="BTSW(this)"></td>
					<td><input id='SW2' class="button" type="button" value="停止" onclick="BTSW(this)"></td>
					<td><input id='SW3' class="button" type="button" value="停止" onclick="BTSW(this)"></td>
				</tr>
			</table>
		</div>
		<div class="div_Moisture">
			<table id="MOISTURE">
				<caption>
					<h1>土壤濕度偵測</h1>
				</caption>
				<thead>
					<th class="table-info">偵測點</th>
					<th class="table-info">設定值(%)</th>
					<th class="table-info">範圍 (+-%)</th>
				</thead>
				<tr>
					<td id="MOISTURE_detect" data-label="偵測點">20.5%</td>
					<td id="MOISTURE_set" data-label="設定值">10</td>
					<td id="MOISTURE_range" data-label="範圍">10</td>
				</tr>
			</table>
		</div>
	</div>

	</br>

	</br>


	</br>
	<table id="SCHE">
		<caption>
			<h1>時間設定</h1>
		</caption>
		<tr>
			<td width="35%">週期</th>
			<td width="25%">時間</td>
			<td>1站</td>
			<td>2站</td>
			<td>3站</td>
			<td width="10%">功能</td>
		</tr>

		<tr>
			<td colspan=7></td>
		</tr>
	</table>
	<table id="MAGIC">
		<tr>
			<td>
			</td>
		</tr>
	</table>
	<div id="content"></div>
	<!-- <script src='./func.js'></script>
	<script src='./index.js'></script> -->
	<script src="./test.js"></script>

	<script>
		setTimeout('connect()', 3000);
	</script>
</body>

</html>
