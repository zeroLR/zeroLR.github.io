<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" id="viewport"
        name="viewport">
    <link rel=" stylesheet" href="./dist/css/webstyle.css" type="text/css">
    <title>輔助肢體抬升機</title>
</head>

<body>
    <div class="container">
        <div class="grid-container">
            <div class="header">
                <h1>輔助升降器</h1>
            </div>
            <div class="status">
                <table>
                    <thead>
                        <th>連接網路</th>
                        <th>訊號品質</th>

                    </thead>
                    <tbody>
                        <tr>
                            <td>RD01</td>
                            <td>-40 777</td>
                        </tr>

                    </tbody>
                    <thead>
                        <th>命令列</th>
                        <th>模式</th>
                    </thead>
                    <tbody>
                        <tr>
                            <td><input type="text" name="" id="cmd"><br><input type="button" value="執行">
                            </td>
                            <td>
                                <select name="act" id="ACT">
                                    <option value="manual">手動</option>
                                    <option value="loop">循環</option>
                                </select>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="motorState">
                馬達狀態: <span id="state">----</span>
            </div>
            <div class="machineState">
                機器狀態: <span id="mstate">stop</span><br>
                位置:<span id="POS">100</span><br>
                速度: <span id="SPD">10000</span><br>
                觸碰極限:<span id="LT">OFF</span><br>
                起點: <span id="PosS">50</span> 終點: <span id="PosE">100</span>
            </div>
            <div class="machineChart">
                <div class="title">機器圖示</div>
                <div>
                    <input id="slide-main" type="range" value="30" disabled>
                </div>
            </div>
            <div class="motorCtl">
                <div class="title">馬達控制</div>
                <div class="motor-container">
                    <div class="up"><input type="button" id="Up" onclick="active('UP')"></div>
                    <div class="stop"><input type="button" id="Stop" onclick="active('STOP')"></div>
                    <div class="down"><input type="button" id="Down" onclick="active('DOWN')"></div>
                    <div class="speedup"><input type="button" id="SpdUp" onclick="active('SPDUP')"></div>
                    <div class="speeddown"><input type="button" id="SpdDown" onclick="active('SPDDOWN')"></div>
                </div>
            </div>
            <div class="loop">
                <div class="title">循環動作功能</div>
                <table>
                    <tr>
                        <td><input type="button" class="btn-min" value="設定起始點" onclick="setCycle( 'STARTPT' )"></td>
                        <td><input type="button" class="btn-max" value="設定終止點" onclick="setCycle( 'STOPPT' )"></td>
                    </tr>
                </table>
            </div>
            <div id="DISPLAY">
            </div>

        </div>
    </div>
</body>
<script src="./elevator2.js"></script>

</html>
