<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0,user-scalable=no">
    <link rel=" stylesheet" href="./dist/css/webstyle.css" type="text/css">
    <title>順裕鐵材通風鐵捲門控制</title>
    <style>
        * {
            font-weight: 700 !important;
            text-shadow: 0.03em 0.03em 0.08em #d7c4bb !important;
            color: saddlebrown;
            -webkit-transition: 0.2s;
            transition: 0.2s;
        }

        .container {
            text-align: center;
        }

        .grid-container {
            display: grid;
            grid-template-areas:
                "header header header header header header"
                "status status status status status status"
                "m1 m1 m1 m1 m1 m1"
                "m2 m2 m2 m2 m2 m2";
            grid-gap: 10px;
            padding: 20px;
            border-radius: 20px;
        }

        .header {
            grid-area: header;
            width: auto;
            margin: auto;
        }

        .status {
            grid-area: status;
            margin: auto;
            border-radius: 10px;
        }

        .status th {
            border-radius: 10px;
            background-color: rgb(57, 212, 187);
            inline-size: 10em;
        }

        .status td {
            border-radius: 10px;
            background-color: rgb(250, 250, 248);
            color: #4a593d;
        }

        .temp-humidity-monitor {
            grid-area: m1;
            width: 95%;
            text-align: center;
        }

        .temp-humidity-monitor table {
            margin: auto;
        }

        .temp-humidity-monitor th {
            border-radius: 10px;
            background-color: rgb(57, 212, 187);
            inline-size: 10em;
        }

        .temp-humidity-monitor td {
            border-radius: 10px;
            background-color: rgb(250, 250, 248);
            color: #4a593d;
        }

        .door-controller {
            grid-area: m2;
            display: grid;
            margin: auto;
            grid-gap: 10px;
            width: 95%;
            font-size: 30px;
        }

        .sw-east {
            grid-area: east;
            background-image: url(./img/bg.svg);
            border-radius: 15px;
        }

        .sw-east table {
            font-size: 50px;
        }

        .sw-east th {
            color: yellow;
        }

        .sw-east input:active {
            box-shadow: 0 3px #666;
            transform: translateY(6px);
        }

        .btn-east-up {
            background-image: url(./img/up.svg);
            background-size: cover;
            height: 0;
        }

        .btn-east-stop {
            background-image: url(./img/stop.svg);
            background-size: cover;
            height: 0;
        }

        .btn-east-down {
            background-image: url(./img/down.svg);
            background-size: cover;
            height: 0;
        }

        .sw-south {
            grid-area: south;
            background-image: url(./img/bg.svg);
            border-radius: 15px;
        }

        .sw-south table {
            font-size: 50px;
        }

        .sw-south th {
            color: yellow;
        }

        .sw-south input:active {
            box-shadow: 0 3px #666;
            transform: translateY(6px);
        }

        .btn-south-up {
            background-image: url(./img/up.svg);
            background-size: cover;
            height: 0;
        }

        .btn-south-stop {
            background-image: url(./img/stop.svg);
            background-size: cover;
            height: 0;
        }

        .btn-south-down {
            background-image: url(./img/down.svg);
            background-size: cover;
            height: 0;
        }

        .sw-west {
            grid-area: west;
            background-image: url(./img/bg.svg);
            border-radius: 15px;
        }

        .sw-west table {
            font-size: 50px;
        }

        .sw-west th {
            color: yellow;
        }

        .sw-west input:active {
            box-shadow: 0 3px #666;
            transform: translateY(6px);
        }

        .btn-west-up {
            background-image: url(./img/up.svg);
            background-size: cover;
            height: 0;
        }

        .btn-west-stop {
            background-image: url(./img/stop.svg);
            background-size: cover;
            height: 0;
        }

        .btn-west-down {
            background-image: url(./img/down.svg);
            background-size: cover;
            height: 0;
        }

        .sw-north {
            grid-area: north;
            background-image: url(./img/bg.svg);
            border-radius: 15px;
        }

        .sw-north table {
            font-size: 50px;
        }

        .sw-north th {
            color: yellow;
        }

        .sw-north input:active {
            box-shadow: 0 3px #666;
            transform: translateY(6px);
        }

        .btn-north-up {
            background-image: url(./img/up.svg);
            background-size: cover;
            height: 0;
        }

        .btn-north-stop {
            background-image: url(./img/stop.svg);
            background-size: cover;
            height: 0;
        }

        .btn-north-down {
            background-image: url(./img/down.svg);
            background-size: cover;
            height: 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="grid-container">
            <div class="header">順裕鐵材通風捲門操作畫面 V1.0</div>
            <div class="status">
                <table>
                    <thead>
                        <th>連接網路</th>
                        <th>訊號品質</th>
                    </thead>
                    <tbody>
                        <tr>
                            <td>******</td>
                            <td>----</td>
                        </tr>
                    </tbody>
                    <tbody>
                        <tr>
                            <td colspan="2"><input type="text" name="" id="CMD"><input type="button" value="執行"
                                    onclick="execCmd()"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="temp-humidity-monitor">
                <div class="title">環境溫濕度監測</div>
                <table>
                    <thead>
                        <th>目前溫度</th>
                        <th>目前濕度</th>
                        <th>雨水感知</th>
                    </thead>
                    <tbody>
                        <tr>
                            <td id="temp">--&#8451</td>
                            <td id="hum">----</td>
                            <td id="RS">----</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="door-controller">
                <div class="title">通風捲門開關</div>
                <div class="sw-east">
                    <table>
                        <thead>
                            <th>東</th>
                        </thead>
                        <tbody>
                            <tr>
                                <td>
                                    <input type="button" value="" class="btn-east-up" onclick="postCmd('EAST OPEN')">
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <input type="button" value="" class="btn-east-stop" onclick="postCmd('EAST STOP')">
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <input type="button" value="" class="btn-east-down" onclick="postCmd('EAST CLOSE')">
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="sw-south">
                    <table>
                        <thead>
                            <th>南</th>
                        </thead>
                        <tbody>
                            <tr>
                                <td>
                                    <input type="button" value="" class="btn-south-up" onclick="postCmd('SOUTH OPEN')">
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <input type="button" value="" class="btn-south-stop"
                                        onclick="postCmd('SOUTH STOP')">
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <input type="button" value="" class="btn-south-down"
                                        onclick="postCmd('SOUTH CLOSE')">
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="sw-west">
                    <table>
                        <thead>
                            <th>西</th>
                        </thead>
                        <tbody>
                            <tr>
                                <td>
                                    <input type="button" value="" class="btn-west-up" onclick="postCmd('WEST OPEN')">
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <input type="button" value="" class="btn-west-stop" onclick="postCmd('WEST STOP')">
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <input type="button" value="" class="btn-west-down" onclick="postCmd('WEST CLOSE')">
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="sw-north">
                    <table>
                        <thead>
                            <th>北</th>
                        </thead>
                        <tbody>
                            <tr>
                                <td>
                                    <input type="button" value="" class="btn-north-up" onclick="postCmd('NORTH OPEN')">
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <input type="button" value="" class="btn-north-stop"
                                        onclick="postCmd('NORTH STOP')">
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <input type="button" value="" class="btn-north-down"
                                        onclick="postCmd('NORTH CLOSE')">
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <div id="content"></div>
    <script src='./func.js'></script>
    <script src='./index.js'></script>
    <script>
        setTimeout('connect()', 3000);
    </script>
</body>

</html>
